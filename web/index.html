<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaoke IA - Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}
header {
    width: 100%;
    padding: 1rem 2rem;
    background: #1a1a2e;
    text-align: center;
    border-bottom: 1px solid #2a2a4a;
}
header h1 { font-size: 1.4rem; color: #f0f; font-weight: 300; letter-spacing: 2px; }
header span { color: #0ff; }
.container {
    max-width: 900px;
    width: 100%;
    padding: 1rem;
    flex: 1;
    display: flex;
    flex-direction: column;
}
.upload-area {
    border: 2px dashed #2a2a4a;
    border-radius: 12px;
    padding: 2rem;
    text-align: center;
    margin: 1rem 0;
    transition: all 0.3s;
    cursor: pointer;
}
.upload-area:hover, .upload-area.dragover {
    border-color: #f0f;
    background: #1a1a2e;
}
.upload-area input { display: none; }
.upload-area p { margin: 0.5rem 0; color: #888; }
.upload-area .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
.upload-area .or { color: #555; font-size: 0.85rem; }
.youtube-input {
    display: flex;
    gap: 0.5rem;
    max-width: 500px;
    margin: 1rem auto;
}
.youtube-input input {
    flex: 1;
    padding: 0.6rem 1rem;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    color: #fff;
    font-size: 0.9rem;
}
.youtube-input input::placeholder { color: #555; }
.youtube-input button, .btn {
    padding: 0.6rem 1.2rem;
    background: linear-gradient(135deg, #f0f, #0ff);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
}
.youtube-input button:hover, .btn:hover { opacity: 0.85; }
.youtube-input button:disabled, .btn:disabled { opacity: 0.4; cursor: not-allowed; }
.player-section { display: none; margin-top: 1rem; }
.player-section.active { display: block; }
.audio-player {
    width: 100%;
    margin: 0.5rem 0;
    border-radius: 8px;
}
.audio-player::-webkit-media-controls-panel { background: #1a1a2e; }
.lyrics-container {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 1.5rem;
    margin: 1rem 0;
    min-height: 200px;
    max-height: 400px;
    overflow-y: auto;
    position: relative;
}
.lyrics-container::-webkit-scrollbar { width: 6px; }
.lyrics-container::-webkit-scrollbar-track { background: #1a1a2e; }
.lyrics-container::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
.lyric-line {
    font-size: 1.2rem;
    padding: 0.5rem 0.8rem;
    margin: 0.3rem 0;
    border-radius: 8px;
    transition: all 0.2s;
    line-height: 1.6;
}
.lyric-line.active { color: #f0f; background: rgba(255,0,255,0.08); }
.lyric-line.past { color: #555; }
.lyric-word {
    display: inline;
    transition: color 0.05s;
    position: relative;
}
.lyric-word.active { color: #0ff; }
.lyric-word.past { color: #f0f; }
.meta-bar {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    font-size: 0.85rem;
    color: #666;
    margin-top: 0.5rem;
}
.meta-bar span { display: flex; align-items: center; gap: 0.3rem; }
.meta-bar .label { color: #444; }
.export-bar {
    display: flex;
    gap: 0.5rem;
    margin: 0.5rem 0;
    flex-wrap: wrap;
}
.export-bar button { font-size: 0.8rem; padding: 0.4rem 0.8rem; }
.status {
    text-align: center;
    padding: 0.5rem;
    color: #888;
    font-size: 0.9rem;
}
.error { color: #f44; }
.loading::after {
    content: "...";
    animation: dots 1.5s infinite;
}
@keyframes dots {
    0% { content: "."; }
    33% { content: ".."; }
    66% { content: "..."; }
}
.piano-roll {
    background: #111122;
    border-radius: 8px;
    padding: 0.5rem;
    margin: 0.5rem 0;
    overflow-x: auto;
    white-space: nowrap;
    min-height: 40px;
}
.piano-note {
    display: inline-block;
    width: 4px;
    border-radius: 2px;
    margin: 0 1px;
    vertical-align: bottom;
    background: #f0f;
    opacity: 0.6;
}
.piano-note.active { opacity: 1; background: #0ff; }
</style>
</head>
<body>
<header><h1><span>Karaoke</span> IA</h1></header>
<div class="container">
    <div class="upload-area" id="uploadArea">
        <div class="icon">&#9835;</div>
        <p><strong>Clique ou arraste</strong> um arquivo de audio (WAV/MP3/OGG)</p>
        <p class="or">— ou cole uma URL do YouTube abaixo —</p>
        <div class="youtube-input">
            <input type="text" id="ytUrl" placeholder="https://youtube.com/watch?v=...">
            <button id="ytBtn">YouTube</button>
        </div>
        <input type="file" id="fileInput" accept="audio/*,.wav,.mp3,.ogg,.flac">
    </div>

    <div id="status" class="status">Carregue um audio ou cole uma URL do YouTube</div>

    <div class="player-section" id="playerSection">
        <audio id="audioPlayer" class="audio-player" controls></audio>

        <div class="meta-bar" id="metaBar"></div>

        <div class="export-bar" id="exportBar">
            <button class="btn" id="exportLrc">Exportar LRC</button>
            <button class="btn" id="exportJson">Exportar JSON</button>
            <button class="btn" id="exportMidi">Exportar MIDI</button>
        </div>

        <div class="lyrics-container" id="lyricsContainer">
            <div class="status">Carregando letra...</div>
        </div>

        <div class="piano-roll" id="pianoRoll"></div>
    </div>
</div>

<script>
const API = window.location.origin;
let projectData = null;
let wordTimings = [];  // [{word, start, end, lineIdx, wordIdx}]
let currentLine = -1;

// --- Upload ---
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const ytUrl = document.getElementById('ytUrl');
const ytBtn = document.getElementById('ytBtn');
const status = document.getElementById('status');
const playerSection = document.getElementById('playerSection');
const audioPlayer = document.getElementById('audioPlayer');
const lyricsContainer = document.getElementById('lyricsContainer');
const metaBar = document.getElementById('metaBar');
const pianoRoll = document.getElementById('pianoRoll');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener('change', () => {
    if (fileInput.files.length) handleFile(fileInput.files[0]);
});

ytBtn.addEventListener('click', () => {
    const url = ytUrl.value.trim();
    if (url) handleYoutube(url);
});

ytUrl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') ytBtn.click();
});

async function handleFile(file) {
    const formData = new FormData();
    formData.append('file', file);
    status.textContent = 'Enviando arquivo...';
    status.className = 'status loading';
    try {
        const resp = await fetch(`${API}/api/upload`, { method: 'POST', body: formData });
        if (!resp.ok) throw new Error(await resp.text());
        const data = await resp.json();
        startPipeline(data.path);
    } catch (e) {
        status.textContent = 'Erro no upload: ' + e.message;
        status.className = 'status error';
    }
}

async function handleYoutube(url) {
    status.textContent = 'Baixando audio do YouTube...';
    status.className = 'status loading';
    try {
        const resp = await fetch(`${API}/api/youtube`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
        });
        if (!resp.ok) throw new Error(await resp.text());
        const data = await resp.json();
        startPipeline(data.path);
    } catch (e) {
        status.textContent = 'Erro no YouTube: ' + e.message;
        status.className = 'status error';
    }
}

async function startPipeline(audioPath) {
    status.textContent = 'Processando audio (pipeline completo)...';
    status.className = 'status loading';
    try {
        const resp = await fetch(`${API}/api/pipeline`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ audio_path: audioPath, language: 'pt' }),
        });
        if (!resp.ok) throw new Error(await resp.text());
        projectData = await resp.json();
        loadProject(projectData);
    } catch (e) {
        status.textContent = 'Erro no pipeline: ' + e.message;
        status.className = 'status error';
    }
}

function loadProject(data) {
    status.textContent = 'Projeto carregado!';
    status.className = 'status';
    playerSection.classList.add('active');

    // Meta
    const meta = data.meta || {};
    metaBar.innerHTML = `
        <span><span class="label">BPM:</span> ${meta.bpm || '?'}</span>
        <span><span class="label">Duracao:</span> ${(meta.dur_ms / 1000).toFixed(1)}s</span>
        <span><span class="label">Notas:</span> ${meta.n_notes || 0}</span>
        <span><span class="label">Segmentos:</span> ${meta.n_segs || 0}</span>
        <span><span class="label">Tom:</span> ${meta.key ? (meta.key.root || '?') + ' ' + (meta.key.mode || '') : '?'}</span>
    `;

    // Audio
    const src = data.src || 'audio';
    const audioSrc = `${API}/api/audio/${encodeURIComponent(src)}`;
    audioPlayer.src = audioSrc;
    audioPlayer.load();

    // Lyrics
    const lyrics = data.lyrics || [];
    wordTimings = [];
    lyricsContainer.innerHTML = '';

    lyrics.forEach((seg, li) => {
        const div = document.createElement('div');
        div.className = 'lyric-line';
        div.dataset.index = li;

        if (seg.w && seg.w.length) {
            seg.w.forEach((w, wi) => {
                const span = document.createElement('span');
                span.className = 'lyric-word';
                span.dataset.line = li;
                span.dataset.word = wi;
                span.textContent = w.w + ' ';
                wordTimings.push({ word: w.w, start: w.s, end: w.e, lineIdx: li, wordIdx: wi, el: span });
                div.appendChild(span);
            });
        } else {
            div.textContent = seg.t || '';
        }

        lyricsContainer.appendChild(div);
    });

    // Piano roll (simplified - show note density)
    const notes = data.notes || [];
    if (notes.length) {
        const dur = meta.dur_ms || 1;
        pianoRoll.innerHTML = '';
        notes.forEach(n => {
            const x = (n.s_ms / dur) * 100;
            const w = Math.max(2, (n.d_ms / dur) * 100);
            const h = Math.max(4, (n.n || 60) / 127 * 30);
            const bar = document.createElement('div');
            bar.className = 'piano-note';
            bar.style.left = x + '%';
            bar.style.width = w + '%';
            bar.style.height = h + 'px';
            bar.title = `Nota ${n.n} (${n.s_ms}ms)`;
            pianoRoll.appendChild(bar);
        });
        pianoRoll.style.position = 'relative';
        pianoRoll.style.height = '40px';
    }

    // Sync playback
    audioPlayer.addEventListener('timeupdate', syncLyrics);
    audioPlayer.play();

    // Export buttons
    document.getElementById('exportLrc').onclick = () => exportFormat('lrc');
    document.getElementById('exportJson').onclick = () => exportFormat('json');
    document.getElementById('exportMidi').onclick = () => exportFormat('midi');
}

function syncLyrics() {
    const time = audioPlayer.currentTime * 1000;  // ms
    const lines = lyricsContainer.querySelectorAll('.lyric-line');
    let activeLine = -1;

    // Update words
    wordTimings.forEach(wt => {
        const active = time >= wt.start && time < wt.end;
        const past = time >= wt.end;
        if (wt.el) {
            wt.el.classList.toggle('active', active);
            wt.el.classList.toggle('past', past);
        }
        if (active || (past && activeLine < 0)) {
            const lineIdx = wt.lineIdx;
            if (active && lineIdx > activeLine) activeLine = lineIdx;
        }
    });

    // Scroll active line into view
    if (activeLine >= 0 && activeLine !== currentLine) {
        currentLine = activeLine;
        lines.forEach((l, i) => {
            l.classList.toggle('active', i === activeLine);
            l.classList.toggle('past', i < activeLine);
        });
        const el = lines[activeLine];
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

async function exportFormat(format) {
    if (!projectData) return;
    let url = '';
    const src = projectData.src || 'audio';

    if (format === 'lrc') {
        const resp = await fetch(`${API}/api/export/lrc`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ project: projectData }),
        });
        const text = await resp.text();
        const blob = new Blob([text], { type: 'text/plain' });
        downloadBlob(blob, src.replace(/\.[^.]+$/, '') + '.lrc');
    } else if (format === 'json') {
        const blob = new Blob([JSON.stringify(projectData, null, 2)], { type: 'application/json' });
        downloadBlob(blob, src.replace(/\.[^.]+$/, '') + '_karaoke.json');
    } else if (format === 'midi') {
        window.open(`${API}/api/download/midi?path=output/outputs/partitura_etapa2.mid`, '_blank');
    }
}

function downloadBlob(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
}
</script>
</body>
</html>
